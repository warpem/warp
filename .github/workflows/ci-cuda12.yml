name: CI CUDA 12

on:
  push:

# cancel in-progress runs that use the same workflow and branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (CUDA 12)
    runs-on: linux-cpu-x64-8core
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Micromamba
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-name: package-build
          create-args: >-
            python=3.10
            conda-build
          init-shell: bash
          cache-environment: true
          post-cleanup: 'all'

      - name: Build conda package
        shell: micromamba-shell {0}
        env:
          CONDA_OVERRIDE_CUDA: "12.9"
        run: |
          # Work around dotnet deactivate.d/dotnet-root.sh referencing unbound $2.
          # BASH_ENV is sourced by every non-interactive bash subprocess, including
          # the ones conda-build spawns for activation/deactivation scripts.
          echo 'set +u' > /tmp/no-strict-unset.sh
          export BASH_ENV=/tmp/no-strict-unset.sh
          conda-build conda-recipe -c nvidia/label/cuda-12.9.0 -c conda-forge
